<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balettmusen</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #334e68;
            display: block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        // constants 
        const MONSTER_VX = 1;
        const PLAYER_STOM_BOUNCE = 6;
        const PLAYER_SKIP = 2;
        // --

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const V_WIDTH = 800;
        const V_HEIGHT = 600;

        // --- PHYSICS GLOBAL ---
        const FLOOR_Y = 454;

        // --- GAME STATE ---
        let score = 0;

        // --- FPS COUNTER STATE ---
        let lastTime = performance.now();
        let fps = 0;
        let frameCount = 0;
        let fpsTimer = 0;

        // --- ART ASSET PATHS ---
        const ASSETS = {
            background: "art/background.jpg",
            player: "art/Balettmusen.png",
            playerRun1: "art/BalettmusenBenupp1.png",
            playerRun2: "art/BalettmusenBenUpp2.png",
            tree: "art/tree.png",
            rock: "art/rock.png",
            moln1: "art/moln_1.png",
            moln2: "art/moln_2.png",
            moln3: "art/moln_3.png",
            monsterWalk1: "art/Ushiri_monster_Walk1.png",
            monsterWalk2: "art/Ushiri_monster_Walk2.png"
        };

        // --- GAME ENTITIES ---
        const backgroundImage = new Image();
        backgroundImage.src = ASSETS.background;

        // --- ENGINE INPUT ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        function handleTouch(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = V_WIDTH / rect.width;
            const scaleY = V_HEIGHT / rect.height;
            const touchX = (e.touches[0].clientX - rect.left) * scaleX;
            const touchY = (e.touches[0].clientY - rect.top) * scaleY;

            if (touchX < player.x) player.x -= 2;
            if (touchX > player.x) player.x += 2;
            if (touchY < player.y) player.y -= 2;
            if (touchY > player.y) player.y += 2;
        }

        // --- SEPARATE ANIMATION SYSTEM DATA STRUCTURES ---

        function createAnimationConfig(frameSourcesArray, interval) {
            const frames = frameSourcesArray.map(src => {
                const img = new Image();
                img.src = src;
                return img;
            });
            return {frames, interval};
        }

        function createAnimationInstance(animationConfig) {
            return {
                config: animationConfig,
                timer: 0,
                currentFrameIndex: 0,
                isActive: true
            };
        }

        const ANIMATIONS = {
            playerRun: createAnimationConfig([ASSETS.playerRun1, ASSETS.playerRun2], 125),
            monsterWalk: createAnimationConfig([ASSETS.monsterWalk1, ASSETS.monsterWalk2], 150)
        };

        // --- SPRITE BUILDER ---
        function createSprite(imgSrc, x, y, w, h, z, flipX = false, flipY = false, vx = 0, vy = 0, gravity = 0, isCloud = false) {
            const img = new Image();
            img.src = imgSrc;
            return {
                img,
                x, y, w, h, z, flipX, flipY,
                vx, vy, gravity,
                isCloud, // Flag to identify cloud objects in update loop
                animation: null
            };
        }

        // Added speeds of -0.3, -0.2, and -0.4 to vx for the clouds, with isCloud set to true
        const sprites = [
            createSprite(ASSETS.player, 400, 200, 200, 200, 2, false, false, 0, 0, 0.4),
            createSprite(ASSETS.moln1, 10, -40, 220, 220, 1, false, false, -0.3, 0, 0, true),
            createSprite(ASSETS.moln2, 318, 56, 220, 220, 1, false, false, -0.2, 0, 0, true),
            createSprite(ASSETS.moln3, 530, 21, 290, 220, 1, false, false, -0.4, 0, 0, true),
            createSprite(ASSETS.monsterWalk1, 50, FLOOR_Y - 142, 150, 150, 3, false, false, MONSTER_VX, 0, 0)
        ];

        const player = sprites[0];
        const monster = sprites[4];

        player.animation = createAnimationInstance(ANIMATIONS.playerRun);
        monster.animation = createAnimationInstance(ANIMATIONS.monsterWalk);

        // Helper to get currently active frame image for a sprite
        function getActiveSpriteImage(s) {
            let activeImg = s.img;
            if (s.animation && s.animation.currentFrameIndex >= 0) {
                const activeFrame = s.animation.config.frames[s.animation.currentFrameIndex];
                if (activeFrame) activeImg = activeFrame;
            }
            return activeImg;
        }

        const collisionCanvas = document.createElement('canvas');
        const collisionCtx = collisionCanvas.getContext('2d', {willReadFrequently: true});

        // --- PIXEL COLLISION ENGINE NARROW PHASE ---
        function checkPixelCollision(s1, s2) {
            const img1 = getActiveSpriteImage(s1);
            const img2 = getActiveSpriteImage(s2);

            if (!img1.complete || !img2.complete) return false;

            // 1. Determine bounding box intersection metrics
            const interX = Math.max(s1.x, s2.x);
            const interY = Math.max(s1.y, s2.y);

            // Strict bounding check: Ensure dimensions are strictly greater than zero before processing
            const interW = Math.floor(Math.min(s1.x + s1.w, s2.x + s2.w) - interX);
            const interH = Math.floor(Math.min(s1.y + s1.h, s2.y + s2.h) - interY);

            if (interW <= 0 || interH <= 0) return false;

            // 2. Setup small offscreen canvas matching intersection size
            collisionCanvas.width = interW;
            collisionCanvas.height = interH;

            // 3. Draw Sprite 1 relative to offscreen coordinate space
            collisionCtx.clearRect(0, 0, interW, interH);
            collisionCtx.save();
            collisionCtx.translate(s1.x + s1.w / 2 - interX, s1.y + s1.h / 2 - interY);
            collisionCtx.scale(s1.flipX ? -1 : 1, s1.flipY ? -1 : 1);
            collisionCtx.drawImage(img1, -s1.w / 2, -s1.h / 2, s1.w, s1.h);
            collisionCtx.restore();

            // 4. Change composite mode: keep pixels *only* where something new overlaps existing pixels
            collisionCtx.globalCompositeOperation = 'source-in';

            // 5. Draw Sprite 2
            collisionCtx.save();
            collisionCtx.translate(s2.x + s2.w / 2 - interX, s2.y + s2.h / 2 - interY);
            collisionCtx.scale(s2.flipX ? -1 : 1, s2.flipY ? -1 : 1);
            collisionCtx.drawImage(img2, -s2.w / 2, -s2.h / 2, s2.w, s2.h);
            collisionCtx.restore();

            // Reset composite operation for safety
            collisionCtx.globalCompositeOperation = 'source-over';

            // 6. Look through the resulting image data buffer for solid pixels (alpha > 0)
            const imgData = collisionCtx.getImageData(0, 0, interW, interH).data;
            for (let i = 3; i < imgData.length; i += 4) {
                if (imgData[i] > 10) { // Threshold level ignoring extreme semi-transparency 
                    return true;
                }
            }
            return false;
        }

        // --- GAME ENGINE PROCESSES ---
        function resizeCanvas() {
            const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
            canvas.width = V_WIDTH * scale;
            canvas.height = V_HEIGHT * scale;
            ctx.scale(scale, scale);
            ctx.imageSmoothingEnabled = false;
        }

        player.lastY = player.y;

        function update(deltaTime) {
            let isMoving = false;

            // Store the player's Y position at the start of the frame before movement updates
            player.lastY = player.y;

            player.vx = 0;

            if (keys['ArrowUp'] || keys['w']) {player.vy -= 0.5; isMoving = true;}
            if (keys['ArrowDown'] || keys['s']) {player.vy += 0.5; isMoving = true;}

            if (keys['ArrowLeft'] || keys['a']) {
                player.vx = -2;
                player.flipX = true;
                isMoving = true;
            }
            if (keys['ArrowRight'] || keys['d']) {
                player.vx = 2;
                player.flipX = false;
                isMoving = true;
            }

            if (monster.x <= 0) {
                monster.vx = MONSTER_VX;
                monster.flipX = false;
            } else if (monster.x + monster.w >= V_WIDTH) {
                monster.vx = -MONSTER_VX;
                monster.flipX = true;
            }

            for (let i = 0; i < sprites.length; i++) {
                const s = sprites[i];

                // Keep moving sprite if it's not the player (clouds maintain their custom negative vx)
                if (s !== player) {
                    s.x += s.vx;
                } else {
                    s.x += s.vx;
                }

                // Cloud wrap-around logic: Check if the cloud has fully exited left
                if (s.isCloud && s.x + s.w < 0) {
                    s.x = V_WIDTH;
                }

                if (s.gravity > 0) {
                    s.vy += s.gravity;
                    s.y += s.vy;

                    if (s.y + s.h >= FLOOR_Y) {
                        s.y = FLOOR_Y - s.h;
                        s.vy = 0;

                        if (s === player && isMoving) {
                            s.vy = -PLAYER_SKIP;
                        }
                    }
                }
            }

            player.x = Math.max(0, Math.min(V_WIDTH - player.w, player.x));
            player.y = Math.max(0, Math.min(V_HEIGHT - player.h, player.y));

            // --- STOMP DETECTION SYSTEM (WITH PREVIOUS FRAME HEIGHT CHECK) ---
            if (player.x < monster.x + monster.w &&
                player.x + player.w > monster.x &&
                player.y < monster.y + monster.h &&
                player.y + player.h > monster.y) {

                // 1. Pixel perfect narrow check
                if (checkPixelCollision(player, monster)) {

                    // 2. State Verification: Player must be falling (vy > 0) AND 
                    //    the player's bottom edge on the PREVIOUS frame must be above the monster's top edge
                    const playerWasAbove = (player.lastY + player.h) <= (monster.y + 10); // 10px buffer for leniency

                    if (player.vy > 0 && playerWasAbove) {
                        score += 1;
                        player.vy = -PLAYER_STOM_BOUNCE; // Propel player up into a bounce
                        monster.vx = -monster.vx;
                        monster.flipX = !monster.flipX;
                    }
                }
            }

            for (let i = 0; i < sprites.length; i++) {
                const s = sprites[i];
                if (s.animation && s.animation.isActive) {
                    const anim = s.animation;

                    if (s === player && !isMoving) {
                        anim.currentFrameIndex = -1;
                        anim.timer = 0;
                        continue;
                    }

                    if (anim.currentFrameIndex === -1) anim.currentFrameIndex = 0;

                    anim.timer += deltaTime;
                    if (anim.timer >= anim.config.interval) {
                        anim.currentFrameIndex = (anim.currentFrameIndex + 1) % anim.config.frames.length;
                        anim.timer = 0;
                    }
                }
            }
        }

        function render() {
            if (backgroundImage.complete && backgroundImage.naturalWidth !== 0) {
                ctx.drawImage(backgroundImage, 0, 0, V_WIDTH, V_HEIGHT);
            } else {
                ctx.fillStyle = '#243b53';
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
            }

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.beginPath();
            ctx.moveTo(0, FLOOR_Y);
            ctx.lineTo(V_WIDTH, FLOOR_Y);
            ctx.stroke();

            for (let i = 0; i < sprites.length; i++) {
                const s = sprites[i];
                let activeImg = getActiveSpriteImage(s);

                if (activeImg.complete && activeImg.naturalWidth !== 0) {
                    ctx.save();
                    ctx.translate(s.x + s.w / 2, s.y + s.h / 2);
                    ctx.scale(s.flipX ? -1 : 1, s.flipY ? -1 : 1);
                    ctx.drawImage(activeImg, -s.w / 2, -s.h / 2, s.w, s.h);
                    ctx.restore();
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.fillRect(s.x, s.y, s.w, s.h);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '10px monospace';
                ctx.fillText(`Z: ${s.z}`, s.x, s.y - 4);
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 55, 22);
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(`FPS: ${fps}`, 15, 25);

            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(V_WIDTH - 120, 10, 110, 22);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(`SCORE: ${score}`, V_WIDTH - 110, 25);
        }

        function gameLoop(currentTime) {
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;
            frameCount++;
            fpsTimer += deltaTime;

            if (fpsTimer >= 500) {
                fps = Math.round((frameCount * 1000) / fpsTimer);
                frameCount = 0;
                fpsTimer = 0;
            }

            update(deltaTime);
            sprites.sort((a, b) => a.z - b.z);
            render();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        requestAnimationFrame((time) => gameLoop(time));
    </script>

</body>

</html>
