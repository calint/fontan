<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Balettmusen</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #334e68;
            display: block;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const V_WIDTH = 800;
        const V_HEIGHT = 600;

        // --- FPS COUNTER STATE ---
        let lastTime = performance.now();
        let fps = 0;
        let frameCount = 0;
        let fpsTimer = 0;

        // --- ART ASSET PATHS ---
        const ASSETS = {
            background: "art/background.jpg",
            player: "art/Balettmusen.png",
            playerRun1: "art/BalettmusenBenupp1.png",
            playerRun2: "art/BalettmusenBenUpp2.png",
            tree: "art/tree.png",
            rock: "art/rock.png",
            moln1: "art/moln_1.png",
            moln2: "art/moln_2.png",
            moln3: "art/moln_3.png"
        };

        // --- GAME ENTITIES ---
        const backgroundImage = new Image();
        backgroundImage.src = ASSETS.background;

        // --- ENGINE INPUT ---
        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.key] = true);
        window.addEventListener('keyup', (e) => keys[e.key] = false);

        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        function handleTouch(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = V_WIDTH / rect.width;
            const scaleY = V_HEIGHT / rect.height;
            const touchX = (e.touches[0].clientX - rect.left) * scaleX;
            const touchY = (e.touches[0].clientY - rect.top) * scaleY;

            if (touchX < player.x) player.x -= 2;
            if (touchX > player.x) player.x += 2;
            if (touchY < player.y) player.y -= 2;
            if (touchY > player.y) player.y += 2;
        }

        // --- SEPARATE ANIMATION SYSTEM DATA STRUCTURES ---

        // Factory for animation configurations (shared data template)
        function createAnimationConfig(frameSourcesArray, interval) {
            const frames = frameSourcesArray.map(src => {
                const img = new Image();
                img.src = src;
                return img;
            });
            return {frames, interval};
        }

        // Factory for tracking the runtime state of a specific animation attached to an entity
        function createAnimationInstance(animationConfig) {
            return {
                config: animationConfig,
                timer: 0,
                currentFrameIndex: 0,
                isActive: true
            };
        }

        // Global animation registry/library configurations
        const ANIMATIONS = {
            playerRun: createAnimationConfig([ASSETS.playerRun1, ASSETS.playerRun2], 125)
        };

        // --- SPRITE BUILDER ---
        function createSprite(imgSrc, x, y, w, h, z, flipX = false, flipY = false) {
            const img = new Image();
            img.src = imgSrc;
            return {
                img,
                x, y, w, h, z, flipX, flipY,
                animation: null // Slot where an animation data structure can be attached
            };
        }

        const sprites = [
            createSprite(ASSETS.player, 400, 200, 200, 200, 2, false, false),
            createSprite(ASSETS.moln1, 10, -40, 220, 220, 1, false, false),
            createSprite(ASSETS.moln2, 318, 56, 220, 220, 1, false, false),
            createSprite(ASSETS.moln3, 530, 21, 290, 220, 1, false, false),
        ];

        const player = sprites[0];

        // Attaching the standalone animation data structure to our player sprite
        player.animation = createAnimationInstance(ANIMATIONS.playerRun);


        // --- GAME ENGINE PROCESSES ---
        function resizeCanvas() {
            const scale = Math.min(window.innerWidth / V_WIDTH, window.innerHeight / V_HEIGHT);
            canvas.width = V_WIDTH * scale;
            canvas.height = V_HEIGHT * scale;
            ctx.scale(scale, scale);
            ctx.imageSmoothingEnabled = false;
        }


        function update(deltaTime) {
            let isMoving = false;

            if (keys['ArrowUp'] || keys['w']) {player.y -= 2; isMoving = true;}
            if (keys['ArrowDown'] || keys['s']) {player.y += 2; isMoving = true;}
            if (keys['ArrowLeft'] || keys['a']) {
                player.x -= 2;
                player.flipX = true;
                isMoving = true;
            }
            if (keys['ArrowRight'] || keys['d']) {
                player.x += 2;
                player.flipX = false;
                isMoving = true;
            }

            player.x = Math.max(0, Math.min(V_WIDTH - player.w, player.x));
            player.y = Math.max(0, Math.min(V_HEIGHT - player.h, player.y));

            // Run the animation component processor system
            for (let i = 0; i < sprites.length; i++) {
                const s = sprites[i];

                if (s.animation && s.animation.isActive) {
                    const anim = s.animation;

                    // Specific handling logic for our player tracking movement state
                    if (s === player && !isMoving) {
                        anim.currentFrameIndex = -1; // Use default static sprite image flag
                        anim.timer = 0;
                        continue;
                    }

                    if (anim.currentFrameIndex === -1) anim.currentFrameIndex = 0;

                    anim.timer += deltaTime;
                    if (anim.timer >= anim.config.interval) {
                        anim.currentFrameIndex = (anim.currentFrameIndex + 1) % anim.config.frames.length;
                        anim.timer = 0;
                    }
                }
            }
        }

        function render() {
            // 1. Draw Background Image
            if (backgroundImage.complete && backgroundImage.naturalWidth !== 0) {
                ctx.drawImage(backgroundImage, 0, 0, V_WIDTH, V_HEIGHT);
            } else {
                ctx.fillStyle = '#243b53';
                ctx.fillRect(0, 0, V_WIDTH, V_HEIGHT);
            }

            // Draw Images
            for (let i = 0; i < sprites.length; i++) {
                const s = sprites[i];

                // Determine which target image reference to draw
                let activeImg = s.img;
                if (s.animation && s.animation.currentFrameIndex >= 0) {
                    const activeFrame = s.animation.config.frames[s.animation.currentFrameIndex];
                    if (activeFrame) activeImg = activeFrame;
                }

                if (activeImg.complete && activeImg.naturalWidth !== 0) {
                    // Save context state before applying coordinate manipulations
                    ctx.save();

                    // Move canvas origin to the center of the sprite
                    ctx.translate(s.x + s.w / 2, s.y + s.h / 2);

                    // Flip coordinates if property flags are true
                    const scaleX = s.flipX ? -1 : 1;
                    const scaleY = s.flipY ? -1 : 1;
                    ctx.scale(scaleX, scaleY);

                    // Draw image centered at the origin (0, 0)
                    ctx.drawImage(activeImg, -s.w / 2, -s.h / 2, s.w, s.h);

                    // Revert canvas grid configuration for next item 
                    ctx.restore();
                } else {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                    ctx.fillRect(s.x, s.y, s.w, s.h);
                }

                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '10px monospace';
                ctx.fillText(`Z: ${s.z}`, s.x, s.y - 4);
            }

            // 2. Render FPS Overlay (Drawn last so it sits on top of all sprites)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
            ctx.fillRect(10, 10, 55, 22);
            ctx.fillStyle = '#00ffcc';
            ctx.font = 'bold 12px monospace';
            ctx.fillText(`FPS: ${fps}`, 15, 25);
        }

        function gameLoop(currentTime) {
            // Calculate delta time
            const deltaTime = currentTime - lastTime;
            lastTime = currentTime;

            // Track frame execution metrics
            frameCount++;
            fpsTimer += deltaTime;

            // Refresh counter every 500ms
            if (fpsTimer >= 500) {
                fps = Math.round((frameCount * 1000) / fpsTimer);
                frameCount = 0;
                fpsTimer = 0;
            }

            update(deltaTime);

            // Sort by Z Layer priority
            sprites.sort((a, b) => a.z - b.z);

            render();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Pass timestamp to the initial loop frame step
        requestAnimationFrame((time) => gameLoop(time));
    </script>

</body>

</html>
